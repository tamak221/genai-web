name: Deploy CDK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  NODE_VERSION: 22.22.2
  # Placeholder: configure these in GitHub Secrets/Variables
  APP_ENV: ${{ vars.APP_ENV || 'prod' }}
  GEMINI_API_KEY_SECRET_ARN: ${{ secrets.GEMINI_API_KEY_SECRET_ARN }}
  TIKTOK_ANALYZER_API_KEY_SECRET_ARN: ${{ secrets.TIKTOK_ANALYZER_API_KEY_SECRET_ARN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          role-session-name: github-actions-cdk-deploy

      - name: Add GitHub Actions temporary IP range to cdk.json
        run: |
          RUNNER_IP="$(curl -fsSL https://api.ipify.org)"
          RUNNER_CIDR="${RUNNER_IP}/32"
          echo "Detected runner CIDR: ${RUNNER_CIDR}"
          export RUNNER_CIDR

          node -e '
            const fs = require("fs");
            const path = "packages/cdk/cdk.json";
            const cdk = JSON.parse(fs.readFileSync(path, "utf8"));
            cdk.context = cdk.context || {};
            const current = Array.isArray(cdk.context.allowedIpV4AddressRanges)
              ? cdk.context.allowedIpV4AddressRanges
              : [];
            const cidr = process.env.RUNNER_CIDR;
            cdk.context.allowedIpV4AddressRanges = Array.from(new Set([...current, cidr]));
            fs.writeFileSync(path, JSON.stringify(cdk, null, 2) + "\n");
          '

      - name: Build CDK package
        run: npm -w packages/cdk run build

      - name: CDK Deploy
        working-directory: packages/cdk
        env:
          APP_ENV: ${{ env.APP_ENV }}
          GEMINI_API_KEY_SECRET_ARN: ${{ env.GEMINI_API_KEY_SECRET_ARN }}
          TIKTOK_ANALYZER_API_KEY_SECRET_ARN: ${{ env.TIKTOK_ANALYZER_API_KEY_SECRET_ARN }}
        run: |
          npx cdk deploy --all --require-approval never \
            -c env="${APP_ENV}" \
            -c appEnv="${APP_ENV}" \
            -c "tiktokAnalyzer={\"enabled\":true,\"defaultTimeoutMs\":30000,\"maxTimeoutMs\":90000,\"apiKeySecretArn\":\"${TIKTOK_ANALYZER_API_KEY_SECRET_ARN}\",\"premiumFeatureFlagKey\":\"tiktokAnalyzer\"}"
